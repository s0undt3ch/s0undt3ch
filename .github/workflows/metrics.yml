name: Metrics

on:
  # Rebuild the metrics SVG once a day...
  schedule:
    - cron: "0 4 * * *"
  # ...on manual dispatch...
  workflow_dispatch:
  # ...and whenever this file or the README changes.
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    strategy:
      # Both variants commit to the default branch, so run them one at a time
      # to avoid two jobs racing on the same push.
      max-parallel: 1
      matrix:
        include:
          # Light card (default) for GitHub's light theme.
          - filename: github-metrics.svg
            extras_css: ""
          # Dark card for GitHub's dark theme. The gray body text (#777777) and
          # accent colors stay legible, so only the card background is recolored.
          - filename: github-metrics.dark.svg
            extras_css: ".background { fill: #0d1117; stroke: #30363d; }"
    steps:
      - name: Generate metrics (${{ matrix.filename }})
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          # A classic Personal Access Token stored as the METRICS_TOKEN secret.
          # See the "Setup" note at the bottom of README.md for the required scopes.
          token: ${{ secrets.METRICS_TOKEN }}
          user: s0undt3ch
          filename: ${{ matrix.filename }}
          extras_css: ${{ matrix.extras_css }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon
          config_order: base.header, languages, activity, habits, base.repositories

          # Most used languages, weighted by recent activity.
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Coding habits and rhythms.
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
